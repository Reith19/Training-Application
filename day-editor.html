<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700;800&display=swap');
*{box-sizing:border-box}body{margin:0;background:#111;color:#fff;font-family:Inter,sans-serif}.topbar{height:74px;display:flex;align-items:center;justify-content:space-between;padding:14px 30px;background:#090909;border-bottom:1px solid rgba(139,0,0,.35);position:sticky;top:0;z-index:50}.logo-area{display:flex;align-items:center;gap:12px;text-decoration:none}.logo-area img{width:44px;height:44px;border-radius:50%;object-fit:contain;filter:drop-shadow(0 0 8px rgba(139,0,0,.7))}.logo-area span,.brand-title,.section-title,.modal-title{font-family:'Bebas Neue',sans-serif;letter-spacing:3px}.logo-area span{font-size:1.65rem;color:#fff}.logout-btn,.btn,.btn-red,.btn-danger{font-family:Inter,sans-serif;border-radius:9px;letter-spacing:1px;font-weight:800;cursor:pointer;white-space:nowrap}.logout-btn{background:rgba(139,0,0,.2);border:1px solid rgba(139,0,0,.45);color:#ff6b6b;padding:9px 18px;font-size:.78rem}.logout-btn:hover,.btn:hover,.btn-red:hover,.btn-danger:hover{transform:translateY(-1px)}.page{max-width:1550px;margin:0 auto;padding:24px 28px 48px}.back{display:inline-flex;color:#777;text-decoration:none;text-transform:uppercase;letter-spacing:1.4px;font-size:.78rem;margin-bottom:18px}.back:hover{color:#cc0000}.header{display:flex;justify-content:space-between;align-items:flex-end;gap:16px;margin-bottom:18px}.brand-title{font-size:2.35rem;line-height:1;margin:0}.brand-title span,.section-title span,.modal-title span{color:#cc0000}.subtitle{color:#888;font-size:.86rem;margin-top:8px;letter-spacing:1px}.actions{display:flex;align-items:center;justify-content:flex-end;gap:10px;flex-wrap:wrap}.btn-red{background:linear-gradient(135deg,#8B0000,#cc0000);border:0;color:#fff;padding:11px 18px;font-size:.78rem}.btn{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);color:#e8e8e8;padding:10px 15px;font-size:.76rem}.btn-danger{background:transparent;border:1px solid rgba(204,0,0,.45);color:#ff6b6b;padding:10px 14px;font-size:.74rem}.btn-sm{padding:8px 10px;font-size:.68rem}.save-status{font-size:.72rem;letter-spacing:1px;color:#00c864;font-weight:900}.save-status.dirty{color:#ffcc66}.panel{background:#171717;border:1px solid rgba(139,0,0,.28);border-radius:17px;overflow:hidden}.panel-head{padding:17px 18px;border-bottom:1px solid rgba(139,0,0,.22);background:rgba(139,0,0,.12);display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap}.panel-body{padding:18px}.section-title{font-size:1.55rem}.input,.textarea{width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:9px;color:#fff;padding:11px 13px;font-family:Inter,sans-serif;font-size:.88rem;outline:none}.input:focus,.textarea:focus{border-color:#8B0000;box-shadow:0 0 0 3px rgba(139,0,0,.18)}.textarea{resize:vertical;min-height:66px}.label{color:#777;font-size:.68rem;text-transform:uppercase;letter-spacing:2px;font-weight:900;margin-bottom:7px}.muted{color:#888;font-size:.82rem}.day-fields{display:grid;grid-template-columns:minmax(0,1fr) 230px;gap:14px;margin-bottom:18px}.exercise-list{display:grid;gap:12px}.exercise-card{background:#101010;border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:16px;display:grid;grid-template-columns:minmax(0,1fr) auto;gap:14px;align-items:center}.exercise-card:hover{border-color:rgba(204,0,0,.4);background:rgba(139,0,0,.08)}.exercise-title{font-size:1rem;font-weight:900;margin-bottom:8px}.completion-box{display:grid;grid-template-columns:220px minmax(0,1fr);gap:14px;align-items:start;margin-bottom:18px}.status-chip{display:inline-flex;border-radius:999px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.05);color:#aaa;padding:6px 12px;font-size:.72rem;font-weight:900;letter-spacing:1px;text-transform:uppercase}.status-chip.completed{border-color:rgba(0,200,100,.45);background:rgba(0,200,100,.1);color:#00c864}.exercise-card.completed{border-color:rgba(0,200,100,.45)}.pill-line{display:flex;gap:7px;flex-wrap:wrap}.pill{display:inline-flex;border-radius:999px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.05);color:#bbb;padding:4px 10px;font-size:.78rem}.empty{border:1px dashed rgba(255,255,255,.13);border-radius:16px;padding:32px;color:#777;text-align:center;background:rgba(255,255,255,.02)}.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.82);backdrop-filter:blur(4px);z-index:200;display:none;align-items:flex-start;justify-content:center;overflow:auto;padding:34px 18px}.modal-overlay.active{display:flex}.modal{width:min(1180px,100%);background:#171717;border:1px solid rgba(139,0,0,.45);border-radius:20px;box-shadow:0 30px 90px rgba(0,0,0,.6);overflow:visible}.modal-head{padding:20px 22px;border-bottom:1px solid rgba(139,0,0,.25);background:rgba(139,0,0,.14);display:flex;justify-content:space-between;gap:12px;align-items:center;flex-wrap:wrap}.modal-title{font-size:1.7rem}.modal-body{padding:18px 22px}.modal-grid{display:grid;grid-template-columns:minmax(0,1fr) minmax(230px,.7fr);gap:14px;margin-bottom:14px}.search-wrap{position:relative}.results{position:absolute;top:calc(100% + 6px);left:0;right:0;background:#202020;border:1px solid rgba(204,0,0,.35);border-radius:10px;display:none;z-index:300;max-height:240px;overflow:auto;box-shadow:0 20px 50px rgba(0,0,0,.45)}.results.active{display:block}.result{padding:10px 12px;border-bottom:1px solid rgba(255,255,255,.06);cursor:pointer}.result:hover{background:rgba(139,0,0,.22)}.result b{font-size:.85rem}.result div{color:#777;font-size:.72rem;margin-top:2px}.line-list{display:grid;gap:12px}.line-card{border:1px solid rgba(255,255,255,.08);border-radius:16px;background:#101010;overflow:hidden}.line-head{padding:12px 14px;background:rgba(255,255,255,.035);border-bottom:1px solid rgba(255,255,255,.06);display:flex;justify-content:space-between;align-items:center;gap:10px}.line-body{padding:14px;display:grid;gap:12px}.line-grid{display:grid;grid-template-columns:.7fr .7fr 1.1fr 1.2fr .9fr .75fr;gap:10px}.notes-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.modal-actions{display:flex;justify-content:flex-end;gap:10px;flex-wrap:wrap;padding:16px 22px;border-top:1px solid rgba(255,255,255,.06);background:rgba(0,0,0,.18)}.toast{position:fixed;right:24px;bottom:24px;background:#1a1a1a;border:1px solid rgba(139,0,0,.4);color:white;padding:12px 20px;border-radius:10px;font-size:.85rem;z-index:999;opacity:0;transform:translateY(10px);transition:.3s}.toast.show{opacity:1;transform:translateY(0)}.toast.success{border-color:#00c864;color:#00c864}.toast.error{border-color:#cc0000;color:#ff6b6b}@media(max-width:980px){.header{flex-direction:column;align-items:flex-start}.actions{justify-content:flex-start}.day-fields,.completion-box,.modal-grid,.line-grid,.notes-grid{grid-template-columns:1fr}.exercise-card{grid-template-columns:1fr}}
</style>

<body>
<div class="topbar"><a href="home.html" class="logo-area"><img src="logo.jpg" alt="RS Fitness"><span>RS FITNESS</span></a><button class="logout-btn" onclick="location.href='index.html'">LOGOUT</button></div>
<div class="page">
<a href="#" class="back" id="backLink">← Back to Program</a>
<div class="header">
  <div><h1 class="brand-title" id="pageTitle">DAY <span>EDITOR</span></h1><div class="subtitle" id="subtitle">Exercise summaries live here. Open an exercise card for full details and set rows.</div></div>
  <div class="actions"><span id="saveStatus" class="save-status">SAVED</span><button class="btn-red" onclick="saveProgram()">SAVE DAY</button><button class="btn" onclick="exportCurrentDay()">EXPORT DAY EXCEL</button><button class="btn" onclick="reloadAll()">REFRESH</button></div>
</div>
<section class="panel" id="dayPanel"><div class="panel-body"><div class="empty">Loading day...</div></div></section>
</div>
<div class="modal-overlay" id="exerciseModal"><div class="modal" id="modalContent"></div></div>
<div class="toast" id="toast"></div>
<script>
const SUPABASE_URL='https://usmeoqyzlnxnoighhiga.supabase.co';
const SUPABASE_KEY='sb_publishable_r5uttSQDB3twbwYYN5-EMg_57_GPPXO';
const headers={'Content-Type':'application/json','apikey':SUPABASE_KEY,'Authorization':`Bearer ${SUPABASE_KEY}`};
const params=new URLSearchParams(location.search);const clientId=params.get('id')||params.get('client_id');const blockId=params.get('block'),weekId=params.get('week'),dayId=params.get('day');
let clientData=null,programData={blocks:[]},workouts=[],current=null,dirty=false,draft=null,draftMode='new',editExerciseId='';
function esc(v){return String(v??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]))}
function js(v){return String(v??'').replace(/\\/g,'\\\\').replace(/'/g,"\\'")}
function id(p){return `${p}_${Date.now()}_${Math.random().toString(16).slice(2)}`}
function clone(v){return JSON.parse(JSON.stringify(v))}
async function dbGet(t,q){const r=await fetch(`${SUPABASE_URL}/rest/v1/${t}?${q}`,{headers});const d=await r.json();if(!r.ok)throw new Error(JSON.stringify(d));return Array.isArray(d)?d[0]:d}
async function dbSelect(t,q=''){const r=await fetch(`${SUPABASE_URL}/rest/v1/${t}?${q}`,{headers});const d=await r.json();if(!r.ok)throw new Error(JSON.stringify(d));return Array.isArray(d)?d:[]}
async function dbUpdate(t,idv,data){const r=await fetch(`${SUPABASE_URL}/rest/v1/${t}?id=eq.${encodeURIComponent(idv)}`,{method:'PATCH',headers:{...headers,'Prefer':'return=representation'},body:JSON.stringify(data)});if(!r.ok){let m=await r.text();throw new Error(m)}return r.json()}
function blankLine(){return{id:id('line'),sets:'',reps:'',intensity:'',suggested_load:'',load:'',lsrpe:'',coach_comments:'',trainee_comments:''}}
function normalizeLine(l={}){return{id:l.id||id('line'),sets:l.sets||'',reps:l.reps||'',intensity:l.intensity||'',suggested_load:l.suggested_load||'',load:l.load||'',lsrpe:l.lsrpe||'',coach_comments:l.coach_comments||'',trainee_comments:l.trainee_comments||''}}
function normalizeExercise(e={}){let lines=Array.isArray(e.lines)&&e.lines.length?e.lines.map(normalizeLine):[normalizeLine({sets:e.sets,reps:e.reps,intensity:e.intensity,suggested_load:e.suggested_load,load:e.load,lsrpe:e.lsrpe,coach_comments:e.coach_comments,trainee_comments:e.trainee_comments})];return{id:e.id||id('exercise'),workout_id:e.workout_id||'',exercise_name:e.exercise_name||'',custom_exercise_name:e.custom_exercise_name||'',lines}}
function normalizeDay(d={}){const status=d.status||(d.completed?'completed':'not_completed');return{id:d.id||id('day'),name:d.name||'Day',workout_date:d.workout_date||'',status,completed_at:d.completed_at||'',day_remarks:d.day_remarks||'',exercises:Array.isArray(d.exercises)?d.exercises.map(normalizeExercise):[]}}
function normalizeWeek(w={}){return{id:w.id||id('week'),name:w.name||'Week',days:Array.isArray(w.days)?w.days.map(normalizeDay):[]}}
function normalizeBlock(b={}){return{id:b.id||id('block'),name:b.name||'Block',weeks:Array.isArray(b.weeks)?b.weeks.map(normalizeWeek):[]}}
function normalizeProgram(p){return{blocks:Array.isArray(p?.blocks)?p.blocks.map(normalizeBlock):[]}}
function locate(){for(const b of programData.blocks){if(b.id!==blockId)continue;for(const w of b.weeks){if(w.id!==weekId)continue;for(const d of w.days){if(d.id===dayId)return{block:b,week:w,day:d}}}}return null}
function markDirty(){dirty=true;const s=document.getElementById('saveStatus');s.textContent='UNSAVED';s.classList.add('dirty')}
function markSaved(){dirty=false;const s=document.getElementById('saveStatus');s.textContent='SAVED';s.classList.remove('dirty')}
async function reloadAll(){try{if(!clientId||!blockId||!weekId||!dayId)throw new Error('Missing day editor URL details.');clientData=await dbGet('clients',`id=eq.${encodeURIComponent(clientId)}`);programData=normalizeProgram(clientData.program_data);workouts=await dbSelect('workouts','select=id,name,category&order=name.asc');current=locate();if(!current)throw new Error('Could not find this block/week/day in the client program.');document.getElementById('backLink').href=`program-builder.html?id=${encodeURIComponent(clientId)}`;document.getElementById('pageTitle').innerHTML=`${esc(current.day.name)} <span>DAY</span>`;document.getElementById('subtitle').textContent=`${current.block.name} → ${current.week.name}. Open each exercise card to edit full details.`;renderDay();markSaved()}catch(e){document.getElementById('dayPanel').innerHTML=`<div class="panel-body"><div class="empty">Error loading day: ${esc(e.message)}</div></div>`;toast('Error loading day.','error')}}
async function saveProgram(){try{await dbUpdate('clients',clientId,{program_data:programData});markSaved();toast('Day saved.','success')}catch(e){toast('Error saving day.','error')}}
function isDayComplete(d){return d.status==='completed'||d.completed===true}
function todayISO(){return new Date().toISOString().slice(0,10)}
function renderDay(){const d=current.day;const done=isDayComplete(d);document.getElementById('pageTitle').innerHTML=`${esc(d.name)} <span>DAY</span>`;document.getElementById('dayPanel').innerHTML=`<div class="panel-head"><div><div class="section-title">DAY <span>DETAILS</span></div><div class="muted">${esc(current.block.name)} → ${esc(current.week.name)}</div></div><div class="actions"><button class="btn-red" onclick="openNewExercise()">ADD EXERCISE</button><button class="btn" onclick="toggleCurrentDayComplete()">${done?'MARK INCOMPLETE':'COMPLETE DAY'}</button><button class="btn" onclick="exportCurrentDay()">EXPORT DAY EXCEL</button></div></div><div class="panel-body"><div class="day-fields"><div><div class="label">Day Name</div><input class="input" value="${esc(d.name)}" oninput="updateDayName(this.value)"></div><div><div class="label">Workout Date</div><input class="input" type="date" value="${esc(d.workout_date||'')}" oninput="updateDayDate(this.value)"></div></div><div class="completion-box"><div><div class="label">Day Completion</div><div class="status-chip ${done?'completed':''}">${done?'Completed':'Not Completed'}</div><div class="muted" style="margin-top:8px">Completion date and remarks are required before marking complete.</div></div><div><div class="label">Completion Date</div><input class="input" type="date" value="${esc(d.completed_at||'')}" oninput="updateCompletedAt(this.value)" style="margin-bottom:12px"><div class="label">Completion Comment / Day Remarks</div><textarea class="textarea" placeholder="Required before completion. Use this for reports later..." oninput="updateDayRemarks(this.value)">${esc(d.day_remarks||'')}</textarea></div></div>${d.exercises.length?`<div class="exercise-list">${d.exercises.map(renderExerciseSummary).join('')}</div>`:'<div class="empty">No exercises yet. Click Add Exercise.</div>'}</div>`}
function renderExerciseSummary(e){const first=e.lines?.[0]||{};const name=e.exercise_name||e.custom_exercise_name||'Untitled Exercise';const bits=[];if(first.sets||first.reps)bits.push(`Sets x Reps: ${first.sets||''} × ${first.reps||''}`.trim());if(first.intensity)bits.push(`Intensity / %: ${first.intensity}`);if(first.suggested_load)bits.push(`Suggested Load: ${first.suggested_load}`);if(first.load)bits.push(`Actual Load: ${first.load}`);if(first.lsrpe)bits.push(`LSRPE: ${first.lsrpe}`);bits.push(`${e.lines.length} set row/s`);return`<div class="exercise-card"><div><div class="exercise-title">${esc(name)}</div><div class="pill-line">${bits.map(b=>`<span class="pill">${esc(b)}</span>`).join('')}</div></div><div class="actions"><button class="btn-red btn-sm" onclick="openEditExercise('${js(e.id)}')">OPEN / EDIT</button><button class="btn-danger btn-sm" onclick="deleteExercise('${js(e.id)}')">DELETE</button></div></div>`}
function updateDayName(v){current.day.name=v;markDirty();renderHeaderSoft()}
function updateDayDate(v){current.day.workout_date=v;markDirty()}
function updateDayRemarks(v){current.day.day_remarks=v;markDirty()}
function updateCompletedAt(v){current.day.completed_at=v;markDirty()}
function toggleCurrentDayComplete(){if(isDayComplete(current.day)){current.day.status='not_completed';current.day.completed_at='';markDirty();renderDay();return}if(!current.day.completed_at){toast('Completion date is required.','error');return}if(!String(current.day.day_remarks||'').trim()){toast('Completion comment is required.','error');return}current.day.status='completed';if(!current.day.workout_date)current.day.workout_date=current.day.completed_at;markDirty();renderDay()}
function renderHeaderSoft(){document.getElementById('pageTitle').innerHTML=`${esc(current.day.name)} <span>DAY</span>`}
function openNewExercise(){draft=normalizeExercise({id:id('exercise'),lines:[blankLine()]});draftMode='new';editExerciseId='';openModal()}
function openEditExercise(eid){const e=current.day.exercises.find(x=>x.id===eid);if(!e)return;draft=clone(e);draftMode='edit';editExerciseId=eid;openModal()}
function openModal(){document.getElementById('exerciseModal').classList.add('active');renderModal()}
function closeModal(){document.getElementById('exerciseModal').classList.remove('active');draft=null;editExerciseId=''}
function renderModal(){if(!draft)return;document.getElementById('modalContent').innerHTML=`<div class="modal-head"><div><div class="modal-title">EXERCISE <span>CARD</span></div><div class="muted">Full exercise details and multiple set rows.</div></div><div class="actions"><button class="btn" onclick="addDraftLine()">ADD SET ROW</button><button class="btn-danger" onclick="closeModal()">CANCEL</button></div></div><div class="modal-body"><div class="modal-grid"><div class="search-wrap"><div class="label">Exercise Search / Name</div><input class="input" id="exerciseSearch" value="${esc(draft.exercise_name||'')}" placeholder="Type to search workout repository..." oninput="draft.exercise_name=this.value;showResults(this.value)" onfocus="showResults(this.value)" onblur="setTimeout(hideResults,180)"><div class="results" id="searchResults"></div></div><div><div class="label">Custom Exercise Name</div><input class="input" value="${esc(draft.custom_exercise_name||'')}" placeholder="Optional custom label" oninput="draft.custom_exercise_name=this.value"></div></div><div class="line-list">${draft.lines.map((l,i)=>renderDraftLine(l,i)).join('')}</div></div><div class="modal-actions"><button class="btn" onclick="addDraftLine()">ADD SET ROW</button>${draftMode==='edit'?`<button class="btn-danger" onclick="deleteExercise('${js(editExerciseId)}');closeModal()">DELETE EXERCISE</button>`:''}<button class="btn-danger" onclick="closeModal()">CANCEL</button><button class="btn-red" onclick="saveDraftExercise()">SAVE EXERCISE</button></div>`}
function renderDraftLine(l,i){return`<div class="line-card"><div class="line-head"><strong>Set Row ${i+1}</strong><button class="btn-danger btn-sm" onclick="deleteDraftLine('${js(l.id)}')">DELETE ROW</button></div><div class="line-body"><div class="line-grid"><div><div class="label">Sets</div><input class="input" value="${esc(l.sets)}" oninput="updateDraftLine('${js(l.id)}','sets',this.value)"></div><div><div class="label">Reps</div><input class="input" value="${esc(l.reps)}" oninput="updateDraftLine('${js(l.id)}','reps',this.value)"></div><div><div class="label">Intensity / %</div><input class="input" value="${esc(l.intensity)}" placeholder="@7 / % increase" oninput="updateDraftLine('${js(l.id)}','intensity',this.value)"></div><div><div class="label">Suggested Load</div><input class="input" value="${esc(l.suggested_load)}" placeholder="42.5kg to 45kg" oninput="updateDraftLine('${js(l.id)}','suggested_load',this.value)"></div><div><div class="label">Actual Load</div><input class="input" value="${esc(l.load)}" oninput="updateDraftLine('${js(l.id)}','load',this.value)"></div><div><div class="label">LSRPE</div><input class="input" value="${esc(l.lsrpe)}" oninput="updateDraftLine('${js(l.id)}','lsrpe',this.value)"></div></div><div class="notes-grid"><div><div class="label">Comments from Coach</div><textarea class="textarea" oninput="updateDraftLine('${js(l.id)}','coach_comments',this.value)">${esc(l.coach_comments)}</textarea></div><div><div class="label">Comments from Trainee</div><textarea class="textarea" oninput="updateDraftLine('${js(l.id)}','trainee_comments',this.value)">${esc(l.trainee_comments)}</textarea></div></div></div></div>`}
function updateDraftLine(lid,k,v){const l=draft.lines.find(x=>x.id===lid);if(l)l[k]=v}
function addDraftLine(){draft.lines.push(blankLine());renderModal()}
function deleteDraftLine(lid){if(draft.lines.length<=1){toast('Keep at least one set row.','error');return}draft.lines=draft.lines.filter(l=>l.id!==lid);renderModal()}
function saveDraftExercise(){if(!draft.exercise_name.trim()&&!draft.custom_exercise_name.trim()){toast('Enter or select an exercise name.','error');return}if(draftMode==='new'){current.day.exercises.push(draft)}else{const idx=current.day.exercises.findIndex(e=>e.id===editExerciseId);if(idx>=0)current.day.exercises[idx]=draft}markDirty();closeModal();renderDay();toast('Exercise updated. Save day when ready.','success')}
function deleteExercise(eid){if(!confirm('Delete this exercise?'))return;current.day.exercises=current.day.exercises.filter(e=>e.id!==eid);markDirty();renderDay()}
function showResults(q){const box=document.getElementById('searchResults');if(!box)return;const s=String(q||'').trim().toLowerCase();const m=workouts.filter(w=>!s||w.name.toLowerCase().includes(s)||(w.category&&w.category.toLowerCase().includes(s))).slice(0,14);box.innerHTML=m.length?m.map(w=>`<div class="result" onmousedown="pickWorkout('${js(w.id)}','${js(w.name)}')"><b>${esc(w.name)}</b><div>${esc(w.category||'Uncategorized')}</div></div>`).join(''):'<div class="result"><b>No matches</b><div>You can still type a custom exercise name.</div></div>';box.classList.add('active')}
function hideResults(){const box=document.getElementById('searchResults');if(box)box.classList.remove('active')}
function pickWorkout(wid,name){draft.workout_id=wid;draft.exercise_name=name;renderModal()}
function excelReady(){if(!window.XLSX){toast('Excel library is still loading. Try again in a moment.','error');return false}return true}
function safeName(s){return String(s||'Sheet').replace(/[\\/?*\[\]:]/g,'-').slice(0,31)||'Sheet'}
function fileName(s){return String(s||'program').replace(/[^a-z0-9_-]+/gi,'_').replace(/^_+|_+$/g,'').slice(0,80)||'program'}
function dayAOA(b,w,d){const aoa=[[`${clientData?.name||'Client'} - ${b.name} - ${w.name} - ${d.name}`],[`Workout Date: ${d.workout_date||''}`],[`Status: ${isDayComplete(d)?'Completed':'Not Completed'}`],[`Completed At: ${d.completed_at||''}`],[`Day Remarks: ${d.day_remarks||''}`],[],['Exercise','Custom Exercise','Sets','Reps','Intensity / %','Suggested Load','Actual Load','LSRPE','Comments from Coach','Comments from Trainee']];for(const e of d.exercises){const lines=e.lines&&e.lines.length?e.lines:[blankLine()];lines.forEach((l,i)=>aoa.push([i===0?(e.exercise_name||''):'',i===0?(e.custom_exercise_name||''):'',l.sets||'',l.reps||'',l.intensity||'',l.suggested_load||'',l.load||'',l.lsrpe||'',l.coach_comments||'',l.trainee_comments||'']));aoa.push(['','','','','','','','','',''])}return aoa}
function makeSheet(aoa){const ws=XLSX.utils.aoa_to_sheet(aoa);ws['!cols']=[{wch:28},{wch:24},{wch:12},{wch:12},{wch:18},{wch:22},{wch:14},{wch:10},{wch:34},{wch:34}];return ws}
function exportCurrentDay(){if(!excelReady()||!current)return;const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,makeSheet(dayAOA(current.block,current.week,current.day)),safeName(current.day.name));XLSX.writeFile(wb,`${fileName(clientData.name+'_'+current.block.name+'_'+current.week.name+'_'+current.day.name)}.xlsx`)}
function toast(msg,type='success'){const t=document.getElementById('toast');t.textContent=msg;t.className=`toast ${type} show`;setTimeout(()=>t.className='toast',3000)}
window.addEventListener('beforeunload',e=>{if(!dirty)return;e.preventDefault();e.returnValue=''});reloadAll();
</script>

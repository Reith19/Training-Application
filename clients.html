<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>RS Fitness | Clients</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700;800&display=swap');
body{font-family:Inter,sans-serif;margin:0;background:#111;min-height:100vh;color:white}.topbar{display:flex;align-items:center;justify-content:space-between;padding:16px 32px;border-bottom:1px solid rgba(139,0,0,.3);background:#090909;position:sticky;top:0;z-index:100}.logo-area{display:flex;align-items:center;gap:12px;text-decoration:none}.logo-area img{width:42px;height:42px;object-fit:contain;border-radius:50%;filter:drop-shadow(0 0 8px rgba(139,0,0,.6))}.logo-area span,.page-title,.modal-title{font-family:'Bebas Neue',sans-serif;letter-spacing:3px}.logo-area span{font-size:1.6rem;color:white}.logout-btn{background:rgba(139,0,0,.2);border:1px solid rgba(139,0,0,.4);color:#ff6b6b;padding:8px 18px;border-radius:8px;font-size:.8rem;cursor:pointer;letter-spacing:1px}.page-content{padding:32px;max-width:1280px;margin:0 auto}.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;gap:16px}.page-title{font-size:2rem}.header-actions{display:flex;align-items:center;gap:12px}.search-wrap{position:relative}.search-input{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:9px 14px;color:white;font-size:.85rem;width:240px}.add-btn,.btn-save{background:linear-gradient(135deg,#8B0000,#cc0000);color:white;border:none;padding:9px 20px;border-radius:8px;font-size:.85rem;font-weight:700;letter-spacing:1px;cursor:pointer}.table-wrap{background:#1a1a1a;border:1px solid rgba(139,0,0,.2);border-radius:16px;overflow:hidden}table{width:100%;border-collapse:collapse}thead{background:rgba(139,0,0,.15);border-bottom:1px solid rgba(139,0,0,.3)}th{padding:14px 16px;text-align:left;font-size:.68rem;letter-spacing:2px;text-transform:uppercase;color:#888;font-weight:800}td{padding:16px;font-size:.86rem;color:#aaa;border-bottom:1px solid rgba(255,255,255,.04)}tbody tr:hover{background:rgba(255,255,255,.03)}.client-name-link{color:white;font-weight:700;text-decoration:none;cursor:pointer}.client-name-link:hover{color:#cc0000}.status-badge{display:inline-block;padding:4px 12px;border-radius:20px;font-size:.72rem;font-weight:700;letter-spacing:1px;text-transform:uppercase}.status-active{background:rgba(0,200,100,.1);color:#00c864;border:1px solid rgba(0,200,100,.2)}.status-inactive{background:rgba(255,255,255,.05);color:#666;border:1px solid rgba(255,255,255,.1)}.btn-delete{background:transparent;border:1px solid rgba(255,255,255,.08);color:#777;padding:5px 12px;border-radius:6px;font-size:.75rem;cursor:pointer}.btn-delete:hover{background:rgba(255,0,0,.1);border-color:#cc0000;color:#ff6b6b}.loading-row td{text-align:center;padding:60px 20px;color:#555}.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:200;display:none;align-items:center;justify-content:center}.modal-overlay.active{display:flex}.modal{background:#1a1a1a;border:1px solid rgba(139,0,0,.4);border-radius:20px;padding:32px;width:100%;max-width:520px;margin:16px}.modal-title{font-size:1.6rem;margin-bottom:24px}.modal-title span{color:#cc0000}.form-group{margin-bottom:16px}.form-label{color:#888;font-size:.72rem;letter-spacing:1.5px;text-transform:uppercase;display:block;margin-bottom:7px;font-weight:800}.form-input,.form-select{width:100%;background:#222;border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:10px 14px;color:white;font-size:.88rem;box-sizing:border-box}.form-input:focus,.form-select:focus{border-color:#8B0000;outline:none}.coach-select-inline{min-width:190px;background:#222;border:1px solid rgba(255,255,255,.12);border-radius:8px;color:white;padding:8px 10px;font-size:.82rem}.coach-select-inline:focus{border-color:#8B0000;outline:none}.modal-actions{display:flex;gap:12px;margin-top:24px}.btn-save,.btn-cancel{flex:1;padding:12px}.btn-save:disabled{opacity:.5;cursor:not-allowed}.btn-cancel{background:rgba(255,255,255,.05);color:#888;border:1px solid rgba(255,255,255,.1);border-radius:8px;font-size:.85rem;cursor:pointer}.muted{color:#888;font-size:.8rem;line-height:1.5}.toast{position:fixed;bottom:24px;right:24px;background:#1a1a1a;border:1px solid rgba(139,0,0,.4);color:white;padding:12px 20px;border-radius:10px;font-size:.85rem;z-index:999;opacity:0;transform:translateY(10px);transition:.3s}.toast.show{opacity:1;transform:translateY(0)}.toast.success{border-color:#00c864;color:#00c864}.toast.error{border-color:#cc0000;color:#ff6b6b}@media(max-width:900px){.page-header,.header-actions{flex-direction:column;align-items:flex-start}.table-wrap{overflow-x:auto}}
</style>
</head>
<body>
<div class="topbar"><a href="home.html" class="logo-area"><img src="logo.jpg" alt="RS Fitness"><span>RS FITNESS</span></a><button class="logout-btn" onclick="rsAuth.signOut()">LOGOUT</button></div>
<div class="page-content">
  <div class="page-header"><div><div class="page-title" id="pageTitle">CLIENTS</div><div class="muted" id="pageSub">Loading client access...</div></div><div class="header-actions"><input type="text" class="search-input" placeholder="Search clients..." oninput="searchClients()" id="searchInput"><button class="add-btn" id="addClientBtn" onclick="openModal()">ADD CLIENT</button></div></div>
  <div class="table-wrap"><table><thead><tr><th>Name</th><th>Coach</th><th>Age</th><th>Country</th><th>Enrollment Date</th><th>Months</th><th>Status</th></tr></thead><tbody id="clientTableBody"><tr class="loading-row"><td colspan="7">Loading clients...</td></tr></tbody></table></div>
</div>
<div class="modal-overlay" id="modalOverlay"><div class="modal"><div class="modal-title">ADD <span>CLIENT</span></div>
  <div class="form-group"><label class="form-label">Full Name</label><input type="text" class="form-input" id="clientName"></div>
  <div class="form-group"><label class="form-label">Assigned Coach</label><select class="form-select" id="clientCoachId"><option value="">Loading coaches...</option></select><div class="muted" style="margin-top:7px">Pick the coach who owns this client. Leave blank only for pending assignment.</div></div>
  <div class="form-group"><label class="form-label">Age</label><input type="text" class="form-input" id="clientAge"></div>
  <div class="form-group"><label class="form-label">Country</label><input type="text" class="form-input" id="clientCountry"></div>
  <div class="form-group"><label class="form-label">Enrollment Date</label><input type="date" class="form-input" id="clientEnrollmentDate"></div>
  <div class="form-group"><label class="form-label">Months Enrolled</label><input type="number" min="0" step="1" class="form-input" id="clientEnrollmentMonths"></div>
  <div class="form-group"><label class="form-label">Status</label><select class="form-select" id="clientStatus"><option value="Active">Active</option><option value="Inactive">Inactive</option></select></div>
  <div class="modal-actions"><button class="btn-cancel" onclick="closeModal()">CANCEL</button><button class="btn-save" id="saveBtn" onclick="addClient()">ADD CLIENT</button></div>
</div></div>
<div class="toast" id="toast"></div>
<script src="app-auth.js"></script>
<script>
let allClients=[], visibleClients=[], coaches=[], currentProfile=null;
function esc(v){return String(v??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]))}
function pack(v){return encodeURIComponent(String(v??''))} function unpack(v){return decodeURIComponent(String(v??''))}
function formatDate(value){if(!value)return '—';const p=String(value).split('-');return p.length===3?`${p[1]}/${p[2]}/${p[0]}`:value}
function formatMonths(value){if(value===null||value===undefined||value==='')return '—';const n=Number(value);return Number.isFinite(n)?`${n} month${n===1?'':'s'}`:value}
function coachName(id){if(!id)return 'No coach assigned';const c=coaches.find(p=>p.id===id);return c?.full_name||c?.username||'Unknown coach'}
function showToast(message,type='success'){const t=document.getElementById('toast');t.textContent=message;t.className=`toast ${type} show`;setTimeout(()=>t.className='toast',3000)}
async function loadCoaches(){const profiles=await rsAuth.dbSelect('profiles','select=id,full_name,username,role,is_active&order=full_name.asc');coaches=profiles.filter(p=>p.is_active&&(p.role==='coach'||p.role==='super_admin'));const sel=document.getElementById('clientCoachId');sel.innerHTML='<option value="">No coach yet / Pending</option>'+coaches.map(c=>`<option value="${esc(c.id)}">${esc(c.full_name||c.username||c.id)}${c.role==='super_admin'?' (Super Admin)':''}</option>`).join('')}
async function loadClients(){try{currentProfile=await rsAuth.requireRoles(['super_admin','coach','client']);if(!currentProfile)return;if(currentProfile.role==='client'){if(currentProfile.client_id)location.href=`client-profile.html?id=${encodeURIComponent(currentProfile.client_id)}`;else showToast('This account is not attached to a client record.','error');return}await loadCoaches();document.getElementById('addClientBtn').style.display=currentProfile.role==='super_admin'?'inline-flex':'none';document.getElementById('pageTitle').textContent=currentProfile.role==='coach'?'MY CLIENTS':'CLIENTS';document.getElementById('pageSub').textContent=currentProfile.role==='coach'?'Showing only clients assigned to you.':'Showing all clients.';let query=currentProfile.role==='coach'?`coach_id=eq.${encodeURIComponent(currentProfile.id)}&order=created_at.desc`:'order=created_at.desc';const data=await rsAuth.dbSelect('clients',query);allClients=Array.isArray(data)?data:[];visibleClients=allClients;renderTable(visibleClients)}catch(e){console.error(e);showToast('Error loading clients: '+(e.message||e),'error');}}
function coachCell(c){
 if(currentProfile?.role!=='super_admin')return esc(coachName(c.coach_id));
 const opts=['<option value="">No coach yet / Pending</option>'].concat(coaches.map(coach=>`<option value="${esc(coach.id)}" ${String(coach.id)===String(c.coach_id||'')?'selected':''}>${esc(coach.full_name||coach.username||coach.id)}${coach.role==='super_admin'?' (Super Admin)':''}</option>`)).join('');
 return `<select class="coach-select-inline" onchange="updateClientCoach('${pack(c.id)}',this.value)">${opts}</select>`;
}
function renderTable(data){const tbody=document.getElementById('clientTableBody');tbody.innerHTML='';if(!data.length){tbody.innerHTML='<tr class="loading-row"><td colspan="7">No clients found.</td></tr>';return}data.forEach(c=>{const tr=document.createElement('tr');tr.innerHTML=`<td><a class="client-name-link" onclick="goToProfile('${esc(c.id)}')">${esc(c.name)}</a></td><td>${coachCell(c)}</td><td>${esc(c.age||'—')}</td><td>${esc(c.country||'—')}</td><td>${esc(formatDate(c.enrollment_date))}</td><td>${esc(formatMonths(c.enrollment_months))}</td><td><span class="status-badge ${c.status==='Active'?'status-active':'status-inactive'}">${esc(c.status||'—')}</span></td>`;tbody.appendChild(tr)})}
async function updateClientCoach(idPacked,coachId){
 if(currentProfile?.role!=='super_admin'){showToast('Only Super Admin can assign coaches.','error');return}
 const id=unpack(idPacked);
 try{
   await rsAuth.dbPatch('clients',`id=eq.${encodeURIComponent(id)}`,{coach_id:coachId||null});
   const found=allClients.find(c=>String(c.id)===String(id));
   if(found)found.coach_id=coachId||null;
   showToast('Coach assignment updated.','success');
   renderTable(allClients.filter(c=>{const q=document.getElementById('searchInput').value.toLowerCase();return !q||(c.name||'').toLowerCase().includes(q)||(coachName(c.coach_id)||'').toLowerCase().includes(q)}));
 }catch(e){
   console.error(e);
   showToast('Error assigning coach: '+(e.message||e),'error');
   loadClients();
 }
}
function goToProfile(id){location.href=`client-profile.html?id=${encodeURIComponent(id)}`}
function searchClients(){const q=document.getElementById('searchInput').value.toLowerCase();renderTable(allClients.filter(c=>(c.name||'').toLowerCase().includes(q)||(coachName(c.coach_id)||'').toLowerCase().includes(q)))}
function openModal(){if(currentProfile?.role!=='super_admin'){showToast('Only Super Admin can add clients.','error');return}document.getElementById('modalOverlay').classList.add('active')}
function closeModal(){document.getElementById('modalOverlay').classList.remove('active');['clientName','clientAge','clientCountry','clientEnrollmentDate','clientEnrollmentMonths'].forEach(id=>document.getElementById(id).value='');document.getElementById('clientCoachId').value='';document.getElementById('clientStatus').value='Active'}
async function addClient(){if(currentProfile?.role!=='super_admin'){showToast('Only Super Admin can add clients.','error');return}const name=document.getElementById('clientName').value.trim();const coach_id=document.getElementById('clientCoachId').value||null;const age=document.getElementById('clientAge').value.trim();const country=document.getElementById('clientCountry').value.trim();const enrollment_date=document.getElementById('clientEnrollmentDate').value||null;const raw=document.getElementById('clientEnrollmentMonths').value.trim();const enrollment_months=raw?Number(raw):null;const status=document.getElementById('clientStatus').value;if(!name){showToast('Please enter a client name.','error');return}if(raw&&(!Number.isFinite(enrollment_months)||enrollment_months<0)){showToast('Months enrolled must be valid.','error');return}const btn=document.getElementById('saveBtn');btn.disabled=true;btn.textContent='SAVING...';try{await rsAuth.dbInsert('clients',{name,coach_id,age,country,enrollment_date,enrollment_months,status});showToast('Client added!','success');closeModal();loadClients()}catch(e){showToast('Error adding client: '+(e.message||e),'error')}finally{btn.disabled=false;btn.textContent='ADD CLIENT'}}
/* Client deletion is handled from Settings so account + client record stay in sync. */
loadClients();
</script>
</body></html>

<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>RS Fitness | My Program</title><script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script><style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700;800&display=swap');*{box-sizing:border-box}body{margin:0;background:#111;color:#fff;font-family:Inter,sans-serif}.topbar{height:74px;display:flex;align-items:center;justify-content:space-between;padding:14px 30px;background:#090909;border-bottom:1px solid rgba(139,0,0,.35);position:sticky;top:0;z-index:50}.logo-area{display:flex;align-items:center;gap:12px;text-decoration:none}.logo-area img{width:44px;height:44px;border-radius:50%;object-fit:contain}.logo-area span,.title,.panel-title{font-family:'Bebas Neue',sans-serif;letter-spacing:3px}.logo-area span{font-size:1.65rem;color:#fff}.logout,.btn{font-family:Inter,sans-serif;border-radius:9px;letter-spacing:1px;font-weight:800;cursor:pointer;white-space:nowrap}.logout{background:rgba(139,0,0,.2);border:1px solid rgba(139,0,0,.45);color:#ff6b6b;padding:9px 18px;font-size:.78rem}.btn{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);color:#eee;padding:10px 14px;font-size:.76rem}.page{max-width:1500px;margin:0 auto;padding:24px 28px 48px}.back{color:#777;text-decoration:none;text-transform:uppercase;letter-spacing:1.4px;font-size:.78rem}.title{font-size:2.5rem;margin:18px 0 8px}.title span,.panel-title span{color:#cc0000}.sub{color:#888;line-height:1.55}.layout{display:grid;grid-template-columns:310px minmax(0,1fr);gap:20px;margin-top:22px}.panel{background:#171717;border:1px solid rgba(139,0,0,.28);border-radius:17px;overflow:hidden}.panel-head{padding:17px 18px;border-bottom:1px solid rgba(139,0,0,.22);background:rgba(139,0,0,.12)}.panel-head.actions-head{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap}.panel-title{font-size:1.55rem}.panel-body{padding:18px}.block-list,.day-grid{display:grid;gap:10px}.block-card,.day-card,.week-tab{border:1px solid rgba(255,255,255,.08);background:#1b1b1b;border-radius:13px;padding:14px;cursor:pointer;color:#fff;text-decoration:none}.block-card.active,.week-tab.active{border-color:rgba(204,0,0,.65);background:rgba(139,0,0,.3)}.name{font-weight:900}.meta{color:#888;font-size:.78rem;margin-top:5px}.week-tabs{display:flex;gap:10px;overflow-x:auto;padding-bottom:4px}.week-tab{min-width:145px}.day-grid{grid-template-columns:repeat(auto-fill,minmax(240px,1fr));margin-top:16px}.day-card:hover,.block-card:hover,.week-tab:hover{border-color:rgba(204,0,0,.45)}.day-card.completed{border-color:rgba(0,200,100,.45);background:rgba(0,200,100,.08)}.green{color:#00c864}.empty{border:1px dashed rgba(255,255,255,.13);border-radius:16px;padding:32px;color:#777;text-align:center;background:rgba(255,255,255,.02)}@media(max-width:900px){.layout{grid-template-columns:1fr}}
</style></head><body>
<div class="topbar"><a href="home.html" class="logo-area"><img src="logo.jpg" alt="RS Fitness"><span>RS FITNESS</span></a><button class="logout" onclick="rsAuth.signOut()">LOGOUT</button></div>
<main class="page"><a class="back" href="home.html">← Back to Home</a><h1 class="title" id="pageTitle">MY <span>PROGRAM</span></h1><div class="sub">View your assigned program. Click a day to log load, LSRPE, comments, and completion.</div><div class="layout"><aside class="panel"><div class="panel-head"><div class="panel-title">BLOCKS</div></div><div class="panel-body"><div id="blocks" class="block-list"><div class="empty">Loading...</div></div></div></aside><section class="panel"><div class="panel-head actions-head"><div class="panel-title">WEEKS <span>& DAYS</span></div><button class="btn" onclick="exportCurrentBlock()">EXPORT BLOCK EXCEL</button></div><div class="panel-body"><div id="weeks" class="week-tabs"></div><div id="days" class="day-grid"></div></div></section></div></main>
<script src="app-auth.js"></script><script>
function esc(v){return String(v??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]))}
const params=new URLSearchParams(location.search);let profile=null,clientId=params.get('id'),clientData=null,program={blocks:[]},bi=0,wi=0;
function isComplete(d){return d?.status==='completed'||d?.completed===true}
function countRows(day){return (day.exercises||[]).reduce((n,e)=>n+((e.lines&&e.lines.length)||1),0)}
async function init(){profile=await rsAuth.requireRoles(['client','coach','super_admin']);if(!profile)return;if(profile.role==='client'){clientId=profile.client_id}if(!clientId){document.getElementById('blocks').innerHTML='<div class="empty">No linked client profile.</div>';return}clientData=await rsAuth.dbGet('clients',`id=eq.${encodeURIComponent(clientId)}`);program=clientData?.program_data||{blocks:[]};document.getElementById('pageTitle').innerHTML=`${esc(clientData?.name||'CLIENT')} <span>PROGRAM</span>`;render()}
function render(){renderBlocks();renderWeeks();renderDays()}
function renderBlocks(){const box=document.getElementById('blocks');if(!program.blocks?.length){box.innerHTML='<div class="empty">No program assigned yet.</div>';return}box.innerHTML=program.blocks.map((b,i)=>{const days=(b.weeks||[]).flatMap(w=>w.days||[]);const done=days.filter(isComplete).length;return `<div class="block-card ${i===bi?'active':''}" onclick="bi=${i};wi=0;render()"><div class="name">${esc(b.name||'Block')}</div><div class="meta">${done}/${days.length} days completed</div></div>`}).join('')}
function renderWeeks(){const b=program.blocks?.[bi];const box=document.getElementById('weeks');if(!b){box.innerHTML='';return}if(!b.weeks?.length){box.innerHTML='<div class="empty">No weeks in this block.</div>';return}box.innerHTML=b.weeks.map((w,i)=>{const days=w.days||[];return `<div class="week-tab ${i===wi?'active':''}" onclick="wi=${i};render()"><div class="name">${esc(w.name||'Week')}</div><div class="meta">${days.filter(isComplete).length}/${days.length} days completed</div></div>`}).join('')}
function renderDays(){const b=program.blocks?.[bi],w=b?.weeks?.[wi],box=document.getElementById('days');if(!w){box.innerHTML='';return}if(!w.days?.length){box.innerHTML='<div class="empty">No days in this week.</div>';return}box.innerHTML=w.days.map((d,i)=>`<a class="day-card ${isComplete(d)?'completed':''}" href="client-day.html?id=${encodeURIComponent(clientId)}&block=${encodeURIComponent(b.id)}&week=${encodeURIComponent(w.id)}&day=${encodeURIComponent(d.id)}"><div class="name ${isComplete(d)?'green':''}">${esc(d.name||('Day '+(i+1)))}</div><div class="meta">${d.exercises?.length||0} exercise/s · ${countRows(d)} set row/s</div><div class="meta">${isComplete(d)?'Completed: '+esc(d.completed_at||''):'Not completed'}</div></a>`).join('')}

function excelReady(){if(!window.XLSX){rsAuth.toast('Excel library still loading. Try again in a few seconds.','error');return false}return true}
function safeSheetName(s){return String(s||'Sheet').replace(/[\\/?*\[\]:]/g,'-').slice(0,31)||'Sheet'}
function safeFileName(s){return String(s||'program').replace(/[^a-z0-9_-]+/gi,'_').replace(/^_+|_+$/g,'').slice(0,90)||'program'}
function dayAOA(block,week,day){
  const aoa=[
    [`${clientData?.name||'Client'} - ${block?.name||'Block'} - ${week?.name||'Week'} - ${day?.name||'Day'}`],
    [`Workout Date: ${day?.workout_date||''}`],
    [`Status: ${isComplete(day)?'Completed':'Not Completed'}`],
    [`Completed At: ${day?.completed_at||''}`],
    [`Day Remarks: ${day?.day_remarks||''}`],
    [],
    ['Exercise','Custom Exercise','Sets','Reps','Intensity / %','Suggested Load','Actual Load','LSRPE','Comments from Coach','Comments from Trainee']
  ];
  (day?.exercises||[]).forEach(e=>{
    const lines=(Array.isArray(e.lines)&&e.lines.length)?e.lines:[e];
    lines.forEach((l,i)=>aoa.push([
      i===0?(e.exercise_name||''):'',
      i===0?(e.custom_exercise_name||''):'',
      l.sets||'',
      l.reps||'',
      l.intensity||'',
      l.suggested_load||'',
      l.load||'',
      l.lsrpe||'',
      l.coach_comments||'',
      l.trainee_comments||''
    ]));
    aoa.push(['','','','','','','','','','']);
  });
  return aoa;
}
function makeSheet(aoa){
  const ws=XLSX.utils.aoa_to_sheet(aoa);
  ws['!cols']=[{wch:28},{wch:24},{wch:12},{wch:12},{wch:18},{wch:22},{wch:14},{wch:10},{wch:34},{wch:34}];
  return ws;
}
function exportCurrentBlock(){
  if(!excelReady())return;
  const block=program.blocks?.[bi];
  if(!block){rsAuth.toast('No block selected.','error');return}
  const wb=XLSX.utils.book_new();
  const weeks=block.weeks||[];
  if(!weeks.length){
    XLSX.utils.book_append_sheet(wb,makeSheet([[`${clientData?.name||'Client'} - ${block.name||'Block'}`],[],['No weeks in this block.']]),safeSheetName(block.name||'Block'));
  }else{
    weeks.forEach((week,idx)=>{
      let aoa=[];
      const days=week.days||[];
      if(!days.length){
        aoa=[[`${clientData?.name||'Client'} - ${block.name||'Block'} - ${week.name||'Week'}`],[],['No days in this week.']];
      }else{
        days.forEach((day,i)=>{if(i)aoa.push([],[]);aoa=aoa.concat(dayAOA(block,week,day));});
      }
      XLSX.utils.book_append_sheet(wb,makeSheet(aoa),safeSheetName(week.name||`Week ${idx+1}`));
    });
  }
  XLSX.writeFile(wb,`${safeFileName((clientData?.name||'Client')+'_'+(block.name||'Block'))}.xlsx`);
}

init();
</script>  <script src="chat-widget.js"></script>
</body></html>

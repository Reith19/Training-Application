<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>RS Fitness | My Profile</title><style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700;800&display=swap');*{box-sizing:border-box}body{margin:0;background:#111;color:#fff;font-family:Inter,sans-serif}.topbar{height:74px;display:flex;align-items:center;justify-content:space-between;padding:14px 30px;background:#090909;border-bottom:1px solid rgba(139,0,0,.35)}.logo-area{display:flex;align-items:center;gap:12px;text-decoration:none}.logo-area img{width:44px;height:44px;border-radius:50%;object-fit:contain}.logo-area span,.title,.panel-title{font-family:'Bebas Neue',sans-serif;letter-spacing:3px}.logo-area span{font-size:1.65rem;color:#fff}.logout,.btn-red,.btn{font-family:Inter,sans-serif;border-radius:9px;letter-spacing:1px;font-weight:800;cursor:pointer}.logout{background:rgba(139,0,0,.2);border:1px solid rgba(139,0,0,.45);color:#ff6b6b;padding:9px 18px;font-size:.78rem}.btn-red{background:linear-gradient(135deg,#8B0000,#cc0000);border:0;color:#fff;padding:11px 17px;font-size:.78rem;text-decoration:none}.btn{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);color:#eee;padding:10px 14px;font-size:.76rem;text-decoration:none}.page{max-width:1100px;margin:0 auto;padding:24px 28px 48px}.back{color:#777;text-decoration:none;text-transform:uppercase;letter-spacing:1.4px;font-size:.78rem}.title{font-size:2.5rem;margin:18px 0 8px}.title span,.panel-title span{color:#cc0000}.sub{color:#888;line-height:1.55}.panel{background:#171717;border:1px solid rgba(139,0,0,.28);border-radius:17px;overflow:hidden;margin-top:22px}.panel-head{padding:17px 18px;border-bottom:1px solid rgba(139,0,0,.22);background:rgba(139,0,0,.12)}.panel-title{font-size:1.55rem}.panel-body{padding:18px}.info-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:18px}.label{color:#777;font-size:.68rem;text-transform:uppercase;letter-spacing:2px;font-weight:900;margin-bottom:7px}.value{font-weight:900}.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:22px}.empty{border:1px dashed rgba(255,255,255,.13);border-radius:16px;padding:32px;color:#777;text-align:center;background:rgba(255,255,255,.02)}@media(max-width:760px){.info-grid{grid-template-columns:1fr}}
</style></head><body><div class="topbar"><a href="home.html" class="logo-area"><img src="logo.jpg" alt="RS Fitness"><span>RS FITNESS</span></a><button class="logout" onclick="rsAuth.signOut()">LOGOUT</button></div><main class="page"><a class="back" href="home.html">← Back to Home</a><h1 class="title" id="title">MY <span>PROFILE</span></h1><div class="sub">Read-only client account view.</div><section class="panel"><div class="panel-head"><div class="panel-title">BASIC <span>INFORMATION</span></div></div><div class="panel-body" id="body"><div class="empty">Loading...</div></div></section></main><script src="app-auth.js"></script><script>
function esc(v){return String(v??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]))}
async function init(){const p=await rsAuth.requireRoles(['client','coach','super_admin']);if(!p)return;let cid=new URLSearchParams(location.search).get('id');if(p.role==='client')cid=p.client_id;if(!cid){document.getElementById('body').innerHTML='<div class="empty">No linked client profile.</div>';return}const c=await rsAuth.dbGet('clients',`id=eq.${encodeURIComponent(cid)}`);document.getElementById('title').innerHTML=`${esc(c?.name||'CLIENT')} <span>PROFILE</span>`;document.getElementById('body').innerHTML=`<div class="info-grid"><div><div class="label">Age</div><div class="value">${esc(c.age||'')}</div></div><div><div class="label">Country</div><div class="value">${esc(c.country||'')}</div></div><div><div class="label">Status</div><div class="value">${esc(c.status||'')}</div></div><div><div class="label">Athlete</div><div class="value">${c.is_athlete?'Yes':'No'}</div></div></div><div class="actions"><a class="btn-red" href="client-program.html?id=${encodeURIComponent(cid)}">VIEW PROGRAM</a><a class="btn" href="progress-tracker.html?id=${encodeURIComponent(cid)}">VIEW PROGRESS</a></div>`}
init();
</script>  <script src="chat-widget.js"></script>
</body></html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RS Fitness | Home</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600&display=swap');

    body {
      font-family: 'Inter', sans-serif;
      margin: 0;
      overflow: hidden;
    }

    .slide {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      opacity: 0;
      transition: opacity 1.5s ease-in-out;
      z-index: 0;
    }

    .slide.active { opacity: 1; }

    .slide-1 { background-image: url('https://images.unsplash.com/photo-1517838277536-f5f99be501cd?w=1600&q=80'); }
    .slide-2 { background-image: url('https://images.unsplash.com/photo-1461896836934-ffe607ba8211?w=1600&q=80'); }
    .slide-3 { background-image: url('https://images.unsplash.com/photo-1552674605-db6ffd4facb5?w=1600&q=80'); }
    .slide-4 { background-image: url('https://images.unsplash.com/photo-1574680096145-d05b474e2155?w=1600&q=80'); }

    .overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.75);
      z-index: 1;
    }

    .content {
      position: relative;
      z-index: 2;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 32px;
      border-bottom: 1px solid rgba(139,0,0,0.3);
      background: rgba(10,10,10,0.7);
      backdrop-filter: blur(10px);
    }

    .logo-area {
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      text-decoration: none;
    }

    .logo-area img {
      width: 42px;
      height: 42px;
      object-fit: contain;
      border-radius: 50%;
      filter: drop-shadow(0 0 8px rgba(139,0,0,0.6));
      transition: filter 0.3s;
    }

    .logo-area:hover img {
      filter: drop-shadow(0 0 14px rgba(204,0,0,0.9));
    }

    .logo-area span {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.6rem;
      color: white;
      letter-spacing: 3px;
    }

    .top-actions {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .chat-btn {
      position: relative;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 50%;
      width: 42px;
      height: 42px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.3s;
      color: white;
    }

    .chat-btn:hover {
      background: rgba(139,0,0,0.3);
      border-color: #8B0000;
    }

    .chat-badge {
      position: absolute;
      top: -4px;
      right: -4px;
      background: #cc0000;
      border-radius: 50%;
      width: 16px;
      height: 16px;
      font-size: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: bold;
    }

    .logout-btn {
      background: rgba(139,0,0,0.2);
      border: 1px solid rgba(139,0,0,0.4);
      color: #ff6b6b;
      padding: 8px 18px;
      border-radius: 8px;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.3s;
      font-family: 'Inter', sans-serif;
      letter-spacing: 1px;
    }

    .logout-btn:hover {
      background: rgba(139,0,0,0.5);
      border-color: #cc0000;
      color: white;
    }

    .welcome-area {
      padding: 32px 32px 16px;
    }

    .welcome-area h2 {
      color: white;
      font-size: 1.1rem;
      font-weight: 300;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .welcome-area h1 {
      font-family: 'Bebas Neue', sans-serif;
      color: white;
      font-size: 2.5rem;
      letter-spacing: 4px;
      margin-top: 2px;
    }

    .welcome-area span { color: #cc0000; }

    .icon-grid {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px 32px;
    }

    .grid-inner {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 20px;
      max-width: 1080px;
      width: 100%;
    }

    .icon-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      padding: 28px 12px;
      border-radius: 16px;
      background: rgba(20,20,20,0.75);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(139,0,0,0.25);
      cursor: pointer;
      transition: all 0.3s ease;
      text-decoration: none;
    }

    .icon-card:hover {
      background: rgba(139,0,0,0.2);
      border-color: #cc0000;
      transform: translateY(-4px);
      box-shadow: 0 12px 30px rgba(139,0,0,0.3);
    }

    .icon-card svg {
      width: 36px;
      height: 36px;
      color: #cc0000;
    }

    .icon-card span {
      color: white;
      font-size: 0.7rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      font-weight: 500;
      text-align: center;
    }

    .dots {
      display: flex;
      justify-content: center;
      gap: 8px;
      padding: 16px;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: rgba(255,255,255,0.3);
      transition: all 0.3s;
      cursor: pointer;
    }

    .dot.active {
      background: #cc0000;
      width: 20px;
      border-radius: 3px;
    }
  </style>
</head>
<body>

  <div class="slide slide-1 active"></div>
  <div class="slide slide-2"></div>
  <div class="slide slide-3"></div>
  <div class="slide slide-4"></div>
  <div class="overlay"></div>

      </div>

    <div class="dots">
      <div class="dot active" onclick="goToSlide(0)"></div>
      <div class="dot" onclick="goToSlide(1)"></div>
      <div class="dot" onclick="goToSlide(2)"></div>
      <div class="dot" onclick="goToSlide(3)"></div>
    </div>
  </div>

  <script>
    const slides = document.querySelectorAll('.slide');
    const dots = document.querySelectorAll('.dot');
    let current = 0;
    let timer;

    function goToSlide(index) {
      slides[current].classList.remove('active');
      dots[current].classList.remove('active');
      current = index;
      slides[current].classList.add('active');
      dots[current].classList.add('active');
      resetTimer();
    }

    function nextSlide() {
      goToSlide((current + 1) % slides.length);
    }

    function resetTimer() {
      clearInterval(timer);
      timer = setInterval(nextSlide, 5000);
    }

    resetTimer();
  </script>

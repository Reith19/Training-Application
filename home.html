<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>RS Fitness | Home</title><style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700;800&display=swap');
*{box-sizing:border-box}body{margin:0;background:#090909;color:#fff;font-family:Inter,sans-serif;min-height:100vh;background-image:linear-gradient(rgba(0,0,0,.78),rgba(0,0,0,.88)),url('https://images.unsplash.com/photo-1534438327276-14e5300c3a48?w=1600&q=80');background-size:cover;background-position:center}.topbar{height:78px;display:flex;align-items:center;justify-content:space-between;padding:16px 32px;background:rgba(5,5,5,.92);border-bottom:1px solid rgba(139,0,0,.35);backdrop-filter:blur(8px)}.logo-area{display:flex;align-items:center;gap:12px;text-decoration:none}.logo-area img{width:48px;height:48px;border-radius:50%;object-fit:contain;filter:drop-shadow(0 0 8px rgba(139,0,0,.7))}.logo-area span,.title,.card span{font-family:'Bebas Neue',sans-serif;letter-spacing:3px}.logo-area span{font-size:1.7rem;color:#fff}.logout{background:rgba(139,0,0,.2);border:1px solid rgba(139,0,0,.45);color:#ff6b6b;padding:9px 18px;border-radius:9px;letter-spacing:1px;font-weight:800;cursor:pointer}.page{max-width:1250px;margin:0 auto;padding:70px 28px}.kicker{color:#777;letter-spacing:2px;text-transform:uppercase;font-size:.78rem}.title{font-size:4rem;line-height:.95;margin:12px 0 10px}.title span{color:#cc0000}.sub{color:#aaa;letter-spacing:1px;max-width:850px;line-height:1.6}.grid{display:grid;grid-template-columns:repeat(6,minmax(0,1fr));gap:20px;margin-top:60px}.card{min-height:165px;background:rgba(20,20,20,.88);border:1px solid rgba(139,0,0,.32);border-radius:16px;padding:22px;text-decoration:none;color:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:12px;transition:.25s;box-shadow:0 18px 45px rgba(0,0,0,.32)}.card:hover{transform:translateY(-5px);border-color:#cc0000;box-shadow:0 20px 50px rgba(139,0,0,.25)}.card svg{width:42px;height:42px;color:#ff1a1a}.card span{font-size:1.05rem}.client-grid{grid-template-columns:repeat(4,minmax(0,1fr));max-width:1000px}.holding{margin-top:50px;background:rgba(20,20,20,.9);border:1px solid rgba(139,0,0,.35);border-radius:18px;padding:30px;max-width:760px}.holding h2{font-family:'Bebas Neue';letter-spacing:3px;font-size:2rem;margin:0 0 10px}.holding h2 span{color:#cc0000}.pill{display:inline-flex;border:1px solid rgba(255,204,102,.45);background:rgba(255,204,102,.1);color:#ffcc66;border-radius:999px;padding:6px 12px;font-size:.72rem;letter-spacing:1px;font-weight:900;text-transform:uppercase;margin-top:16px}.coach-note{margin-top:16px;color:#aaa;line-height:1.55}@media(max-width:1100px){.grid,.client-grid{grid-template-columns:repeat(3,minmax(0,1fr))}}@media(max-width:760px){.grid,.client-grid{grid-template-columns:1fr 1fr}.title{font-size:3rem}.page{padding-top:35px}}@media(max-width:520px){.grid,.client-grid{grid-template-columns:1fr}}
</style></head><body>
<div class="topbar"><a href="home.html" class="logo-area"><img src="logo.jpg" alt="RS Fitness"><span>RS FITNESS</span></a><button class="logout" onclick="rsAuth.signOut()">LOGOUT</button></div>
<main class="page"><div class="kicker" id="roleLabel">Loading...</div><h1 class="title" id="homeTitle">RS <span>FITNESS</span></h1><div class="sub" id="homeSub">Checking account access...</div><div id="cards" class="grid"></div></main>
<script src="app-auth.js"></script><script>
function esc(v){return String(v??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]))}
function icon(name){const icons={clients:'M15 19.128a9.38 9.38 0 0 0 2.625.372 9.337 9.337 0 0 0 4.121-.952 4.125 4.125 0 0 0-7.533-2.493M15 19.128v-.003c0-1.113-.285-2.16-.786-3.07M12 6.375a3.375 3.375 0 1 1-6.75 0 3.375 3.375 0 0 1 6.75 0Zm8.25 2.25a2.625 2.625 0 1 1-5.25 0 2.625 2.625 0 0 1 5.25 0Z',coach:'M18 18.72a9.094 9.094 0 0 0 3.741-.479 3 3 0 0 0-4.682-2.72m.94 3.198.001.031c0 .225-.012.447-.037.666A11.944 11.944 0 0 1 12 21c-2.17 0-4.207-.576-5.963-1.584A6.062 6.062 0 0 1 6 18.75m12 0a5.971 5.971 0 0 0-.941-3.197m0 0A5.995 5.995 0 0 0 12 12.75a5.995 5.995 0 0 0-5.058 2.803m0 0A5.971 5.971 0 0 0 6 18.75m12-6.75a3 3 0 1 0-6 0 3 3 0 0 0 6 0Zm-12 0a3 3 0 1 1 6 0 3 3 0 0 1-6 0Z',pay:'M2.25 18.75a60.07 60.07 0 0 1 15.797 2.101c.727.198 1.453-.342 1.453-1.096V18.75M3.75 4.5h16.5M2.25 6v9m18-9v9M15 10.5a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z',video:'m15.75 10.5 4.72-4.72a.75.75 0 0 1 1.28.53v11.38a.75.75 0 0 1-1.28.53l-4.72-4.72M4.5 18.75h9a2.25 2.25 0 0 0 2.25-2.25v-9a2.25 2.25 0 0 0-2.25-2.25h-9A2.25 2.25 0 0 0 2.25 7.5v9a2.25 2.25 0 0 0 2.25 2.25Z',reports:'M3 13.125C3 12.504 3.504 12 4.125 12h2.25c.621 0 1.125.504 1.125 1.125v6.75M9.75 8.625c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125v11.25M16.5 4.125c0-.621.504-1.125 1.125-1.125h2.25C20.496 3 21 3.504 21 4.125v15.75',gear:'M9.594 3.94c.09-.542.56-.94 1.11-.94h2.593c.55 0 1.02.398 1.11.94l.213 1.281c.063.374.313.686.645.87l1.217-.456a1.125 1.125 0 0 1 1.37.49l1.296 2.247a1.125 1.125 0 0 1-.26 1.431l-1.003.827a7.723 7.723 0 0 1 0 .255l1.004.827c.424.35.534.955.26 1.43l-1.298 2.247a1.125 1.125 0 0 1-1.369.491l-1.217-.456a6.47 6.47 0 0 1-.22.128c-.331.183-.581.495-.644.869l-.213 1.281c-.09.543-.56.94-1.11.94h-2.594c-.55 0-1.019-.398-1.11-.94l-.213-1.281a6.52 6.52 0 0 1-.22-.127l-1.217.456a1.125 1.125 0 0 1-1.369-.49L2.76 15.88a1.125 1.125 0 0 1 .26-1.431l1.004-.827a6.932 6.932 0 0 1 0-.255l-1.004-.827a1.125 1.125 0 0 1-.26-1.43l1.297-2.247a1.125 1.125 0 0 1 1.37-.491l1.216.456c.332-.183.582-.495.644-.869l.214-1.28Z',program:'M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01',user:'M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.5 20.25a8.25 8.25 0 0 1 15 0'};return `<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="${icons[name]}"/></svg>`}
function card(href,label,ic){return `<a href="${href}" class="card">${icon(ic)}<span>${label}</span></a>`}
function holding(profile){document.getElementById('cards').className='';document.getElementById('cards').innerHTML=`<section class="holding"><h2>NO <span>COACH ASSIGNED</span></h2><div class="sub">Your account is active, but no coach has been assigned yet. Once RS Fitness assigns your coach, your program and progress tools will appear here.</div><div class="pill">Request a Coach</div><div class="coach-note">For now, please contact RS Fitness or your coach directly to activate your training access.</div></section>`}
async function init(){const profile=await rsAuth.requireRoles(['super_admin','coach','client']);if(!profile)return;document.getElementById('roleLabel').textContent=`${profile.role.replace('_',' ')} access`;if(profile.role==='client'){document.getElementById('homeTitle').innerHTML='MY <span>ACCOUNT</span>';document.getElementById('homeSub').innerHTML=`${esc(profile.full_name||'Client')} · Client dashboard.`;const cid=profile.client_id;if(!cid){holding(profile);return}const client=await rsAuth.dbGet('clients',`id=eq.${encodeURIComponent(cid)}&select=id,name,coach_id`);if(!client?.coach_id){holding(profile);return}let coachName='My Coach';try{const coach=await rsAuth.dbGet('profiles',`id=eq.${encodeURIComponent(client.coach_id)}&select=full_name,username`);coachName=coach?.full_name||coach?.username||'My Coach'}catch(e){}document.getElementById('cards').className='grid client-grid';document.getElementById('cards').innerHTML=[card(`client-program.html?id=${encodeURIComponent(cid)}`,'My Program','program'),card(`progress-tracker.html?id=${encodeURIComponent(cid)}`,'My Progress','reports'),card(`client-account.html?id=${encodeURIComponent(cid)}`,'My Profile','user'),card(`coaches.html?id=${encodeURIComponent(cid)}`,coachName,'coach')].join('');return}if(profile.role==='coach'){document.getElementById('homeTitle').innerHTML='RS <span>COACH</span>';document.getElementById('homeSub').textContent='Coach dashboard. You only see clients assigned to you.';document.getElementById('cards').innerHTML=[card('clients.html','My Clients','clients'),card('coaches.html','Coaches','coach'),card('workouts.html','Workout Repository','video'),card('reports.html','Reports','reports')].join('');return}document.getElementById('homeTitle').innerHTML='RS <span>ADMIN</span>';document.getElementById('homeSub').textContent='Super admin dashboard.';document.getElementById('cards').innerHTML=[card('clients.html','Clients','clients'),card('coaches.html','Coaches','coach'),card('payments.html','Payments','pay'),card('workouts.html','Workout Repository','video'),card('reports.html','Reports','reports'),card('settings.html','Settings','gear')].join('')}
init();
</script></body></html>

<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>RS Fitness | First Admin Setup</title><style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700;800&display=swap');*{box-sizing:border-box}body{margin:0;background:#111;color:#fff;font-family:Inter,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}.card{width:min(520px,100%);background:#171717;border:1px solid rgba(139,0,0,.35);border-radius:20px;padding:28px}.title{font-family:'Bebas Neue',sans-serif;letter-spacing:3px;font-size:2rem}.title span{color:#cc0000}.muted{color:#999;line-height:1.55;font-size:.88rem}.label{color:#777;font-size:.68rem;text-transform:uppercase;letter-spacing:2px;font-weight:900;margin:14px 0 7px}.input{width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:9px;color:#fff;padding:12px 13px;font-family:Inter,sans-serif;outline:none}.btn{width:100%;margin-top:18px;background:linear-gradient(135deg,#8B0000,#cc0000);border:0;color:#fff;padding:13px;border-radius:9px;font-weight:900;letter-spacing:1px;cursor:pointer}.danger{color:#ffcc66;background:rgba(255,204,102,.08);border:1px solid rgba(255,204,102,.25);padding:10px;border-radius:10px;margin-top:14px;font-size:.82rem}.toast{margin-top:14px;color:#00c864}.toast.error{color:#ff6b6b}</style></head><body>
<div class="card"><div class="title">FIRST ADMIN <span>SETUP</span></div><p class="muted">Use this only once after running <b>auth-schema.sql</b>. It creates the first Supabase Auth user and the first <b>super_admin</b> profile. Delete this file from GitHub after setup.</p><div class="danger">Do not leave this page online permanently.</div>
<div class="label">Full Name</div><input id="fullName" class="input" placeholder="Rex Sumpio"><div class="label">Username</div><input id="username" class="input" placeholder="rex"><div class="label">Login Email</div><input id="email" class="input" type="email" placeholder="you@email.com"><div class="label">Password</div><input id="password" class="input" type="password" placeholder="At least 6 characters"><button id="btn" class="btn" onclick="setup()">CREATE SUPER ADMIN</button><div id="msg" class="toast"></div></div>
<script src="app-auth.js"></script><script>
async function setup(){const full_name=document.getElementById('fullName').value.trim(),username=document.getElementById('username').value.trim(),email=document.getElementById('email').value.trim(),password=document.getElementById('password').value,msg=document.getElementById('msg'),btn=document.getElementById('btn');if(!full_name||!username||!email||!password){msg.className='toast error';msg.textContent='Fill all fields.';return}btn.disabled=true;btn.textContent='CREATING...';try{const user=await rsAuth.createAuthUser(email,password);await rsAuth.dbInsert('profiles',{id:user.id,full_name,username,role:'super_admin',client_id:null,is_active:true});msg.className='toast';msg.textContent='Super admin created. You can now login at index.html. Delete first-admin-setup.html from GitHub.'}catch(e){msg.className='toast error';msg.textContent=e.message||'Setup failed.'}finally{btn.disabled=false;btn.textContent='CREATE SUPER ADMIN'}}</script></body></html>

<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>RS Fitness | Coaches</title><style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700;800&display=swap');*{box-sizing:border-box}body{margin:0;background:#111;color:#fff;font-family:Inter,sans-serif}.topbar{height:74px;display:flex;align-items:center;justify-content:space-between;padding:14px 30px;background:#090909;border-bottom:1px solid rgba(139,0,0,.35)}.logo-area{display:flex;align-items:center;gap:12px;text-decoration:none}.logo-area img{width:44px;height:44px;border-radius:50%;object-fit:contain}.logo-area span,.title,.panel-title{font-family:'Bebas Neue';letter-spacing:3px}.logo-area span{font-size:1.65rem;color:#fff}.logout{background:rgba(139,0,0,.2);border:1px solid rgba(139,0,0,.45);color:#ff6b6b;padding:9px 18px;border-radius:9px;letter-spacing:1px;font-weight:800;cursor:pointer}.page{max-width:1200px;margin:0 auto;padding:28px}.back{color:#777;text-decoration:none;text-transform:uppercase;letter-spacing:1.4px;font-size:.78rem}.title{font-size:2.6rem;margin:18px 0 8px}.title span,.panel-title span{color:#cc0000}.sub{color:#888;line-height:1.55}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;margin-top:22px}.card{background:#171717;border:1px solid rgba(139,0,0,.28);border-radius:16px;padding:18px}.panel-title{font-size:1.45rem}.meta{color:#aaa;font-size:.86rem;line-height:1.6;margin-top:10px}.badge{display:inline-flex;border-radius:999px;border:1px solid rgba(0,200,100,.45);background:rgba(0,200,100,.1);color:#00c864;padding:4px 10px;font-size:.68rem;font-weight:900;letter-spacing:1px;text-transform:uppercase}.empty{border:1px dashed rgba(255,255,255,.13);border-radius:16px;padding:28px;color:#777;text-align:center;background:rgba(255,255,255,.02);margin-top:22px}.client-list{margin-top:12px;color:#888;font-size:.82rem;line-height:1.6}.toast{position:fixed;right:24px;bottom:24px;background:#1a1a1a;border:1px solid rgba(139,0,0,.4);color:white;padding:12px 20px;border-radius:10px;font-size:.85rem;z-index:999;opacity:0;transform:translateY(10px);transition:.3s}.toast.show{opacity:1;transform:translateY(0)}.toast.error{border-color:#cc0000;color:#ff6b6b}
</style></head><body><div class="topbar"><a href="home.html" class="logo-area"><img src="logo.jpg" alt="RS Fitness"><span>RS FITNESS</span></a><button class="logout" onclick="rsAuth.signOut()">LOGOUT</button></div><main class="page"><a class="back" href="home.html">← Back to Dashboard</a><h1 class="title" id="title">COACHES <span></span></h1><div class="sub" id="sub">Loading coach information...</div><div id="grid" class="grid"></div></main><div id="toast" class="toast"></div><script src="app-auth.js"></script><script>
function esc(v){return String(v??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]))}
function toast(m,t='error'){const x=document.getElementById('toast');x.textContent=m;x.className=`toast ${t} show`;setTimeout(()=>x.className='toast',3000)}
async function load(){try{const profile=await rsAuth.requireRoles(['super_admin','coach','client']);if(!profile)return;const grid=document.getElementById('grid');if(profile.role==='client'){document.getElementById('title').innerHTML='MY <span>COACH</span>';if(!profile.client_id){grid.innerHTML='<div class="empty">No client record linked yet.</div>';return}const client=await rsAuth.dbGet('clients',`id=eq.${encodeURIComponent(profile.client_id)}&select=id,name,coach_id`);if(!client?.coach_id){document.getElementById('sub').textContent='No coach has been assigned yet.';grid.innerHTML='<div class="empty">You have not been assigned a coach yet. Please contact RS Fitness.</div>';return}const coach=await rsAuth.dbGet('profiles',`id=eq.${encodeURIComponent(client.coach_id)}&select=id,full_name,username,role,is_active`);document.getElementById('sub').textContent='Your assigned coach.';grid.innerHTML=coachCard(coach,[client]);return}const [profiles,clients]=await Promise.all([rsAuth.dbSelect('profiles','select=id,full_name,username,role,is_active&order=full_name.asc'),rsAuth.dbSelect('clients','select=id,name,coach_id&order=name.asc')]);const coaches=profiles.filter(p=>p.role==='coach'||p.role==='super_admin');document.getElementById('title').innerHTML=profile.role==='coach'?'COACHES <span>DIRECTORY</span>':'COACHES <span>/ ADMIN</span>';document.getElementById('sub').textContent=profile.role==='coach'?'Read-only coach directory.':'Coach list with assigned client counts.';grid.innerHTML=coaches.length?coaches.map(c=>coachCard(c,clients.filter(x=>x.coach_id===c.id))).join(''):'<div class="empty">No coaches yet.</div>'}catch(e){console.error(e);toast(e.message||'Error loading coaches.')}}
function coachCard(c,assigned){return `<section class="card"><div class="panel-title">${esc(c?.full_name||c?.username||'Coach')}</div><div class="meta">Username: ${esc(c?.username||'—')}<br>Role: <span class="badge">${esc(String(c?.role||'coach').replace('_',' '))}</span> ${c?.is_active?'<span class="badge">ACTIVE</span>':''}<br>Assigned clients: <b>${assigned.length}</b></div>${assigned.length?`<div class="client-list">${assigned.slice(0,10).map(x=>'• '+esc(x.name)).join('<br>')}${assigned.length>10?'<br>• ...':''}</div>`:''}</section>`}
load();
</script></body></html>

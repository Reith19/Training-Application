<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>RS Fitness | Client Day</title><style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700;800&display=swap');*{box-sizing:border-box}body{margin:0;background:#111;color:#fff;font-family:Inter,sans-serif}.topbar{height:74px;display:flex;align-items:center;justify-content:space-between;padding:14px 30px;background:#090909;border-bottom:1px solid rgba(139,0,0,.35);position:sticky;top:0;z-index:50}.logo-area{display:flex;align-items:center;gap:12px;text-decoration:none}.logo-area img{width:44px;height:44px;border-radius:50%;object-fit:contain}.logo-area span,.title,.panel-title,.modal-title{font-family:'Bebas Neue',sans-serif;letter-spacing:3px}.logo-area span{font-size:1.65rem;color:#fff}.logout,.btn,.btn-red{font-family:Inter,sans-serif;border-radius:9px;letter-spacing:1px;font-weight:800;cursor:pointer;white-space:nowrap}.logout{background:rgba(139,0,0,.2);border:1px solid rgba(139,0,0,.45);color:#ff6b6b;padding:9px 18px;font-size:.78rem}.btn{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);color:#eee;padding:10px 14px;font-size:.76rem}.btn-red{background:linear-gradient(135deg,#8B0000,#cc0000);border:0;color:#fff;padding:11px 17px;font-size:.78rem}.page{max-width:1350px;margin:0 auto;padding:24px 28px 48px}.back{color:#777;text-decoration:none;text-transform:uppercase;letter-spacing:1.4px;font-size:.78rem}.title{font-size:2.5rem;margin:18px 0 8px}.title span,.panel-title span,.modal-title span{color:#cc0000}.sub,.muted{color:#888;line-height:1.55}.panel{background:#171717;border:1px solid rgba(139,0,0,.28);border-radius:17px;overflow:hidden;margin-top:20px}.panel-head{padding:17px 18px;border-bottom:1px solid rgba(139,0,0,.22);background:rgba(139,0,0,.12);display:flex;justify-content:space-between;gap:12px;align-items:center;flex-wrap:wrap}.panel-title{font-size:1.55rem}.panel-body{padding:18px}.label{color:#777;font-size:.68rem;text-transform:uppercase;letter-spacing:2px;font-weight:900;margin-bottom:7px}.input,.textarea{width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:9px;color:#fff;padding:11px 13px;font-family:Inter,sans-serif;font-size:.88rem;outline:none}.input:focus,.textarea:focus{border-color:#8B0000;box-shadow:0 0 0 3px rgba(139,0,0,.18)}.textarea{resize:vertical;min-height:72px}.completion{display:grid;grid-template-columns:220px 1fr;gap:14px;margin-bottom:18px}.status{display:inline-flex;border-radius:999px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.05);color:#aaa;padding:6px 12px;font-size:.72rem;font-weight:900;letter-spacing:1px;text-transform:uppercase}.status.completed{border-color:rgba(0,200,100,.45);background:rgba(0,200,100,.1);color:#00c864}.exercise-list{display:grid;gap:12px}.exercise{background:#101010;border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:16px;display:grid;grid-template-columns:minmax(0,1fr) auto;gap:14px;align-items:center}.exercise:hover{border-color:rgba(204,0,0,.4)}.exercise-title{font-weight:900;margin-bottom:8px}.pill-line{display:flex;gap:7px;flex-wrap:wrap}.pill{display:inline-flex;border-radius:999px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.05);color:#bbb;padding:4px 10px;font-size:.78rem}.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:200;display:none;align-items:flex-start;justify-content:center;overflow:auto;padding:34px 18px}.modal-overlay.active{display:flex}.modal{width:min(1050px,100%);background:#171717;border:1px solid rgba(139,0,0,.45);border-radius:20px;box-shadow:0 30px 90px rgba(0,0,0,.6);overflow:hidden}.modal-head{padding:20px 22px;border-bottom:1px solid rgba(139,0,0,.25);background:rgba(139,0,0,.14);display:flex;justify-content:space-between;gap:12px;align-items:center}.modal-title{font-size:1.7rem}.modal-body{padding:18px 22px}.line{border:1px solid rgba(255,255,255,.08);border-radius:15px;background:#101010;margin-bottom:12px;overflow:hidden}.line-head{padding:12px 14px;background:rgba(255,255,255,.035);border-bottom:1px solid rgba(255,255,255,.06);font-weight:900}.line-grid{padding:14px;display:grid;grid-template-columns:repeat(6,1fr);gap:10px}.notes{padding:0 14px 14px;display:grid;grid-template-columns:1fr 1fr;gap:10px}.readonly{color:#aaa;padding:11px 0}.actions{display:flex;gap:10px;flex-wrap:wrap}.empty{border:1px dashed rgba(255,255,255,.13);border-radius:16px;padding:32px;color:#777;text-align:center;background:rgba(255,255,255,.02)}@media(max-width:950px){.completion,.line-grid,.notes{grid-template-columns:1fr}.exercise{grid-template-columns:1fr}}
</style></head><body>
<div class="topbar"><a href="home.html" class="logo-area"><img src="logo.jpg" alt="RS Fitness"><span>RS FITNESS</span></a><button class="logout" onclick="rsAuth.signOut()">LOGOUT</button></div>
<main class="page"><a class="back" id="backLink" href="client-program.html">← Back to Program</a><h1 class="title" id="pageTitle">DAY <span>WORKOUT</span></h1><div class="sub" id="subtitle">Client day view. Open exercise cards to log actual load, LSRPE, and trainee comments.</div><section class="panel" id="dayPanel"><div class="panel-body"><div class="empty">Loading...</div></div></section></main>
<div class="modal-overlay" id="modal"><div class="modal" id="modalContent"></div></div>
<script src="app-auth.js"></script><script>
function esc(v){return String(v??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]))}
function js(v){return String(v??'').replace(/\\/g,'\\\\').replace(/'/g,"\\'")}
const params=new URLSearchParams(location.search);let clientId=params.get('id'),blockId=params.get('block'),weekId=params.get('week'),dayId=params.get('day');let profile,clientData,program,current,draft;
function isComplete(d){return d?.status==='completed'||d?.completed===true}
function locate(){for(const b of program.blocks||[]){if(b.id!==blockId)continue;for(const w of b.weeks||[]){if(w.id!==weekId)continue;for(const d of w.days||[]){if(d.id===dayId)return{block:b,week:w,day:d}}}}return null}
function firstLine(e){return (e.lines&&e.lines[0])||{}}
function lineCount(e){return (e.lines&&e.lines.length)||1}
async function init(){profile=await rsAuth.requireRoles(['client','coach','super_admin']);if(!profile)return;if(profile.role==='client')clientId=profile.client_id;if(!clientId||!blockId||!weekId||!dayId){document.getElementById('dayPanel').innerHTML='<div class="panel-body"><div class="empty">Missing day URL details.</div></div>';return}clientData=await rsAuth.dbGet('clients',`id=eq.${encodeURIComponent(clientId)}`);program=clientData.program_data||{blocks:[]};current=locate();if(!current){document.getElementById('dayPanel').innerHTML='<div class="panel-body"><div class="empty">Day not found.</div></div>';return}document.getElementById('backLink').href=`client-program.html?id=${encodeURIComponent(clientId)}`;document.getElementById('pageTitle').innerHTML=`${esc(current.day.name)} <span>WORKOUT</span>`;document.getElementById('subtitle').textContent=`${current.block.name} → ${current.week.name}`;render()}
function render(){const d=current.day,done=isComplete(d);document.getElementById('dayPanel').innerHTML=`<div class="panel-head"><div><div class="panel-title">DAY <span>LOG</span></div><div class="muted">Only actual load, LSRPE, trainee comments, and completion are editable here.</div></div><div class="actions"><button class="btn-red" onclick="saveAll()">SAVE LOG</button><button class="btn" onclick="toggleComplete()">${done?'MARK INCOMPLETE':'COMPLETE DAY'}</button></div></div><div class="panel-body"><div class="completion"><div><div class="label">Status</div><div class="status ${done?'completed':''}">${done?'Completed':'Not Completed'}</div><div class="muted" style="margin-top:8px">Completion date and comment are required.</div></div><div><div class="label">Completion Date</div><input class="input" type="date" value="${esc(d.completed_at||'')}" oninput="current.day.completed_at=this.value" style="margin-bottom:12px"><div class="label">Completion Comment</div><textarea class="textarea" placeholder="How did the session go?" oninput="current.day.day_remarks=this.value">${esc(d.day_remarks||'')}</textarea></div></div>${d.exercises?.length?`<div class="exercise-list">${d.exercises.map(renderExercise).join('')}</div>`:'<div class="empty">No exercises assigned yet.</div>'}</div>`}
function renderExercise(e){const f=firstLine(e),name=e.exercise_name||e.custom_exercise_name||'Untitled Exercise';const bits=[];if(f.sets||f.reps)bits.push(`Sets x Reps: ${f.sets||''} × ${f.reps||''}`);if(f.intensity)bits.push(`Intensity / %: ${f.intensity}`);if(f.suggested_load)bits.push(`Suggested Load: ${f.suggested_load}`);if(f.load)bits.push(`Actual Load: ${f.load}`);if(f.lsrpe)bits.push(`LSRPE: ${f.lsrpe}`);bits.push(`${lineCount(e)} set row/s`);return `<div class="exercise"><div><div class="exercise-title">${esc(name)}</div><div class="pill-line">${bits.map(b=>`<span class="pill">${esc(b)}</span>`).join('')}</div></div><button class="btn-red" onclick="openExercise('${js(e.id)}')">OPEN CARD</button></div>`}
function openExercise(eid){const e=current.day.exercises.find(x=>x.id===eid);if(!e)return;draft=e;document.getElementById('modal').classList.add('active');renderModal()}
function closeModal(){document.getElementById('modal').classList.remove('active');draft=null}
function renderModal(){const e=draft,name=e.exercise_name||e.custom_exercise_name||'Exercise';document.getElementById('modalContent').innerHTML=`<div class="modal-head"><div><div class="modal-title">${esc(name)} <span>CARD</span></div><div class="muted">Prescription is read-only. Log your actuals and comments.</div></div><button class="btn" onclick="closeModal()">CLOSE</button></div><div class="modal-body">${(e.lines||[]).map((l,i)=>renderLine(l,i)).join('')}<div class="actions"><button class="btn-red" onclick="saveAll().then(()=>closeModal())">SAVE LOG</button><button class="btn" onclick="closeModal()">CANCEL</button></div></div>`}
function renderLine(l,i){return `<div class="line"><div class="line-head">Set Row ${i+1}</div><div class="line-grid"><div><div class="label">Sets</div><div class="readonly">${esc(l.sets||'—')}</div></div><div><div class="label">Reps</div><div class="readonly">${esc(l.reps||'—')}</div></div><div><div class="label">Intensity / %</div><div class="readonly">${esc(l.intensity||'—')}</div></div><div><div class="label">Suggested Load</div><div class="readonly">${esc(l.suggested_load||'—')}</div></div><div><div class="label">Actual Load</div><input class="input" value="${esc(l.load||'')}" oninput="l.load=this.value"></div><div><div class="label">LSRPE</div><input class="input" value="${esc(l.lsrpe||'')}" oninput="l.lsrpe=this.value"></div></div><div class="notes"><div><div class="label">Coach Comments</div><div class="readonly">${esc(l.coach_comments||'—')}</div></div><div><div class="label">Trainee Comments</div><textarea class="textarea" oninput="l.trainee_comments=this.value">${esc(l.trainee_comments||'')}</textarea></div></div></div>`}
async function toggleComplete(){
  const d=current.day;
  if(isComplete(d)){
    d.status='not_completed';
    d.completed=false;
    d.completed_at='';
    await saveAll('Day marked incomplete.');
    render();
    return;
  }
  if(!d.completed_at){rsAuth.toast('Completion date is required.','error');return}
  if(!String(d.day_remarks||'').trim()){rsAuth.toast('Completion comment is required.','error');return}
  d.status='completed';
  d.completed=true;
  if(!d.workout_date)d.workout_date=d.completed_at;
  await saveAll('Day marked complete.');
  render();
}
async function saveAll(message='Log saved.'){try{await rsAuth.dbPatch('clients',`id=eq.${encodeURIComponent(clientId)}`,{program_data:program});rsAuth.toast(message,'success');return true}catch(e){rsAuth.toast('Error saving log.','error');return false}}
init();
</script></body></html>
